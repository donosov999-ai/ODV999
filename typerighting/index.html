  <body>
    <div id="app"></div>
    <script>
      // Аналитика (Rybbit) + PWA — ТОЛЬКО в браузере (веб-версия на typefree.pro/github.io),
      // НЕ в нативном Tauri-приложении: там внешний трекер бесполезен офлайн + режется CSP,
      // а service worker не нужен. Проверяем маркер Tauri.
      if (!('__TAURI_INTERNALS__' in window) && !('__TAURI__' in window)) {
        var a = document.createElement('script');
        a.src = 'https://analytics.asibots.pro/api/script.js';
        a.setAttribute('data-site-id', '14'); // Rybbit сайт «TypeRIGHTing app» (site_id=14, создан 10.07; id=3 был занят 777-gidra)
        a.defer = true;
        document.head.appendChild(a);
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('./sw.js').catch(function () {});
          });
        }
      }
    </script>
  </body>
