# Loco — конфигурация окружения development
logger:
  enable: true
  pretty_backtrace: true
  level: debug
  format: compact

server:
  port: 5150
  host: http://localhost
  middlewares:
    cors:
      enable: true
      allow_origins:
        - http://localhost:3000

database:
  uri: "{{ get_env(name="DATABASE_URL", default="postgres://companion:companion@localhost:5432/companion_dev") }}"
  enable_logging: true
  auto_migrate: true
  dangerously_truncate: false
  dangerously_recreate: false

# Кастомные настройки приложения (читаются в коде через ctx.config.settings)
settings:
  jwt_secret: "{{ get_env(name="JWT_SECRET", default="change-me-to-a-long-random-secret") }}"
  ollama_url: "{{ get_env(name="OLLAMA_URL", default="http://localhost:11434") }}"
  ollama_model: "{{ get_env(name="OLLAMA_MODEL", default="llama3.1:8b") }}"
  comfyui_url: "{{ get_env(name="COMFYUI_URL", default="http://localhost:8188") }}"
  # Сколько последних сообщений диалога подкладывать в контекст модели
  history_window: 20
</content>
