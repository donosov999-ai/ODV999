.tab.active{background:var(--info);color:#fff;border-color:var(--info)}
.section{display:none}.section.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:10px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px;cursor:pointer;transition:all .15s}
.card:hover{border-color:var(--info);transform:translateY(-1px)}
.card.active{border:2px solid var(--info)}
.cn{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
.cname{font-size:13px;font-weight:600;margin-bottom:2px}
.cdesc{font-size:10px;color:var(--text2);line-height:1.3;margin-bottom:4px}
.pill{display:inline-block;font-size:9px;padding:1px 5px;border-radius:5px;margin:1px 1px 0 0}
.det{background:var(--bg2);border-radius:var(--radius);padding:14px;margin:8px 0 14px;display:none;animation:fi .2s}
.det.show{display:block}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.det h3{font-size:14px;font-weight:600;margin-bottom:8px}
.det table{width:100%;font-size:11px;border-collapse:collapse}
.det td{padding:4px 6px;border-bottom:1px solid var(--border);vertical-align:top}
.det td:first-child{font-weight:600;white-space:nowrap;width:20%;color:var(--text)}
.det td:last-child{color:var(--text2);line-height:1.4}
.stag{font-size:9px;padding:2px 6px;border-radius:5px;display:inline-block;margin:1px}
.pct-row{display:flex;align-items:center;gap:5px;margin:2px 0;font-size:10px}
.pct-bar{height:5px;border-radius:3px;flex-shrink:0}
.pct-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}
.pct-val{font-weight:600;min-width:24px;text-align:right;font-size:9px}
.wg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:600px){.wg{grid-template-columns:1fr}}
.w{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:11px;line-height:1.5}

.histo-bar-fill{height:100%;border-radius:4px;transition:width .6s;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;font-size:9px;font-weight:600;color:#fff;min-width:20px}
.histo-score{min-width:32px;font-size:10px;font-weight:600;text-align:left;margin-left:4px}
.summary-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.summary-card h4{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text)}

.cal-day{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px;min-height:90px;font-size:10px}
.cal-day.off{background:var(--bg2);opacity:.7}
.cal-dname{font-weight:600;font-size:11px;text-align:center;margin-bottom:4px;color:var(--text)}
.cal-item{padding:3px 5px;border-radius:5px;margin-bottom:2px;font-size:9px;line-height:1.2}
.cal-monthly{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-bottom:16px}
.cal-mcard{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px}

.cal-ycard{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}

// Build global substance scores
function buildGlobalScores(){
const scores={};
['brain','potency','youth','strength','vision'].forEach(k=>{
 D[k].items.forEach(sys=>{
  sys.subs.forEach(s=>{
   if(!s.n||s.n==='Рассмотреть'||!s.p)return;
   const key=normName(s.n);
   if(!scores[key])scores[key]={total:0,sections:{},dose:s.d};
   scores[key].total+=s.p;
   if(!scores[key].sections[k])scores[key].sections[k]=0;
   scores[key].sections[k]+=s.p;
  });
 });
});
return Object.entries(scores).sort((a,b)=>b[1].total-a[1].total);
}

const tabs=document.getElementById('tabs'),secs=document.getElementById('sections');
let aCards={};
Object.keys(D).forEach(k=>{const t=document.createElement('div');t.className='tab'+(k==='brain'?' active':'');t.textContent=D[k].tab;t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('s-'+k).classList.add('active')};t.id='t-'+k;tabs.appendChild(t)});

Object.keys(D).forEach(k=>{const s=document.createElement('div');s.className='section'+(k==='brain'?' active':'');s.id='s-'+k;
if(D[k].custom)s.innerHTML=bSafety();
else if(D[k].summary)s.innerHTML=bSummary();

else s.innerHTML=bCards(k,D[k])+bHistoSection(k,D[k]);
secs.appendChild(s)});

function bCards(k,d){let h='<div style="font-size:13px;font-weight:600;margin-bottom:8px">'+d.title+'</div><div class="grid">';
d.items.forEach((s,i)=>{h+='<div class="card" id="c-'+k+'-'+i+'" onclick="tC(\''+k+'\','+i+')"><div class="cn">'+(i+1)+'</div><div class="cname">'+s.icon+' '+s.name+'</div><div class="cdesc">'+s.desc+'</div><div>'+s.subs.slice(0,4).map(x=>'<span class="pill '+s.cls+'">'+(x.n||x)+'</span>').join('')+(s.subs.length>4?'<span class="pill c9">+'+(s.subs.length-4)+'</span>':'')+'</div></div>'});

function tC(k,i){const s=D[k].items[i],det=document.getElementById('d-'+k);
document.querySelectorAll('#s-'+k+' .card').forEach(c=>c.classList.remove('active'));
if(aCards[k]===i){aCards[k]=null;det.classList.remove('show');return}
aCards[k]=i;document.getElementById('c-'+k+'-'+i).classList.add('active');
const col=colors[s.cls]||'#888';
let pctHtml=s.subs.map(x=>{if(!x.p)return'';return'<div class="pct-row"><div class="pct-bar" style="width:'+x.p+'px;background:'+col+'"></div><span class="pct-name">'+x.n+(x.d?' '+x.d:'')+'</span><span class="pct-val">'+x.p+'%</span></div>'}).join('');
det.innerHTML='<h3>'+s.icon+' '+s.name+'</h3><table><tr><td>Механизм</td><td>'+s.mech+'</td></tr><tr><td>Эффект</td><td>'+s.effect+'</td></tr><tr><td>Вклад</td><td>'+pctHtml+'</td></tr><tr><td>Правила</td><td>'+s.rules+'</td></tr></table>';

function bHistoSection(k,d){
// Aggregate same substance across systems using normalized name
const agg={};
d.items.forEach(sys=>{sys.subs.forEach(s=>{
 if(!s.p||!s.n||s.n==='Рассмотреть')return;
 const key=normName(s.n);
 if(!agg[key]){agg[key]={total:0,parts:[],dose:s.d,display:key}}
 agg[key].total+=s.p;
 agg[key].parts.push({sys:sys.name,p:s.p,cls:sys.cls});
})});
const sorted=Object.entries(agg).sort((a,b)=>b[1].total-a[1].total);
const maxP=sorted[0]?sorted[0][1].total:1;
const sectionNames={brain:'Мозг',potency:'Либидо/T',youth:'Молодость',strength:'Сила/Тело',vision:'Зрение',mushrooms:'Грибы'};
let h='<div class="histo-section"><div class="histo-title">\u{1F4CA} Рейтинг добавок: '+(sectionNames[k]||k)+' (суммарный вклад через все системы)</div>';
sorted.forEach(([name,data],idx)=>{
 const w=Math.round(data.total/maxP*100);
 // Build stacked bar segments
 let segs='';
 data.parts.forEach(p=>{
  const sw=Math.round(p.p/maxP*100);
  const col=colors[p.cls]||'#888';
  segs+='<div style="width:'+sw+'%;height:100%;background:'+col+';display:inline-block" title="'+p.sys+' '+p.p+'%"></div>';
 });
 const sysLabel=data.parts.map(p=>p.sys+' '+p.p+'%').join(' + ');
 const medal=idx<3?['\u{1F947}','\u{1F948}','\u{1F949}'][idx]+' ':'';
 h+='<div class="histo-row"><div class="histo-label" style="'+(idx<3?'font-weight:600;color:var(--text)':'')+'" title="'+sysLabel+'">'+medal+name+'</div>';
 h+='<div class="histo-bar-bg" style="display:flex;overflow:hidden">'+segs+'</div>';
 h+='<div class="histo-score">'+data.total+(data.parts.length>1?' <span style="font-size:9px;color:var(--text3)">('+data.parts.length+' сист.)</span>':'')+'</div></div>';
});
return h+'</div>'}
