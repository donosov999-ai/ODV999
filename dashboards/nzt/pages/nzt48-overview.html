<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NZT-48 — Полная карта системы v4.0</title>
<style>
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#262626;
  --text:#e8e8e8;--text2:#999;--text3:#666;
  --border:#333;--border2:#444;
  --accent:#00e5a0;--accent2:#00b87a;--accentBg:rgba(0,229,160,.08);
  --red:#e24b4a;--redBg:rgba(226,75,74,.1);
  --yellow:#f0c040;--yellowBg:rgba(240,192,64,.1);
  --blue:#378add;--blueBg:rgba(55,138,221,.1);
  --purple:#a78bfa;--purpleBg:rgba(167,139,250,.1);
  --orange:#f97316;--orangeBg:rgba(249,115,22,.1);
  --pink:#ec4899;--pinkBg:rgba(236,72,153,.1);
  --cyan:#22d3ee;--cyanBg:rgba(34,211,238,.08);
  --gold:#fbbf24;
  --radius:10px;--radiusSm:6px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:'SF Mono','Cascadia Code','Consolas',monospace;
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#f8f8f6;--bg2:#fff;--bg3:#f0f0ec;--bg4:#e8e8e4;
    --text:#1a1a1a;--text2:#666;--text3:#999;
    --border:#ddd;--border2:#ccc;
    --accent:#059669;--accent2:#047857;--accentBg:rgba(5,150,105,.06);
    --redBg:rgba(226,75,74,.06);--yellowBg:rgba(240,192,64,.06);
    --blueBg:rgba(55,138,221,.06);--purpleBg:rgba(167,139,250,.06);
    --orangeBg:rgba(249,115,22,.06);--pinkBg:rgba(236,72,153,.06);
    --cyanBg:rgba(34,211,238,.06);
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.header{padding:20px 16px 0;text-align:center}
.header h1{font-size:clamp(20px,4vw,28px);font-weight:800;letter-spacing:-.5px;margin-bottom:2px}
.header h1 span{color:var(--accent)}
.header .sub{color:var(--text2);font-size:12px}
.tabs-wrap{position:sticky;top:0;z-index:100;background:var(--bg);padding:8px 0 0;border-bottom:1px solid var(--border)}
.tabs{display:flex;overflow-x:auto;gap:2px;padding:0 12px 8px;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:var(--radiusSm);font-size:12px;font-weight:600;cursor:pointer;background:transparent;border:none;color:var(--text2);transition:.15s;white-space:nowrap}
.tab:hover{background:var(--bg3);color:var(--text)}
.tab.active{background:var(--accent);color:#000}
.content{padding:12px;max-width:1200px;margin:0 auto}
.panel{display:none;animation:fadeIn .25s}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:.2s}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card-icon{font-size:20px;flex-shrink:0}
.card-title{font-weight:700;font-size:14px;flex:1}
.card-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.badge-ok{background:var(--accentBg);color:var(--accent)}
.badge-red{background:var(--redBg);color:var(--red)}
.badge-yellow{background:var(--yellowBg);color:var(--yellow)}
.badge-blue{background:var(--blueBg);color:var(--blue)}
.badge-purple{background:var(--purpleBg);color:var(--purple)}
.badge-pink{background:var(--pinkBg);color:var(--pink)}
.badge-orange{background:var(--orangeBg);color:var(--orange)}
.card-desc{font-size:12px;color:var(--text2);margin-bottom:8px}
.pills{display:flex;flex-wrap:wrap;gap:4px}
.pill{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);white-space:nowrap}
.pill.accent{background:var(--accentBg);color:var(--accent);border-color:rgba(0,229,160,.2)}
.pill.red{background:var(--redBg);color:var(--red);border-color:rgba(226,75,74,.2)}
.pill.yellow{background:var(--yellowBg);color:var(--yellow);border-color:rgba(240,192,64,.2)}
.pill.blue{background:var(--blueBg);color:var(--blue);border-color:rgba(55,138,221,.2)}
.details{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);line-height:1.6}
.card.open .details{display:block}
.card.open{border-color:var(--accent)}
table.data{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
table.data th{text-align:left;padding:6px 8px;background:var(--bg3);color:var(--text2);font-weight:600;border:1px solid var(--border);white-space:nowrap}
table.data td{padding:6px 8px;border:1px solid var(--border);vertical-align:top}
.histo-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:16px}
.histo-title{font-weight:700;font-size:14px;margin-bottom:10px}
.histo-bar{display:flex;align-items:center;margin-bottom:6px;gap:8px}
.histo-label{width:120px;font-size:11px;font-weight:600;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.histo-track{flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative}
.histo-fill{height:100%;border-radius:4px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:700;color:#000;min-width:24px}
.histo-medal{width:20px;font-size:13px;text-align:center;flex-shrink:0}
.histo-effect{font-size:10px;color:var(--text2);width:140px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.section-title{font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title span{color:var(--accent)}
.stat-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;flex:1;min-width:120px}
.stat-box .val{font-size:20px;font-weight:800}
.stat-box .lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.stat-box.red .val{color:var(--red)}
.stat-box.yellow .val{color:var(--yellow)}
.stat-box.green .val{color:var(--accent)}
.timeline{position:relative;padding-left:20px;margin:12px 0}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:12px;padding-left:16px}
.tl-item::before{content:'';position:absolute;left:-18px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.tl-item.red::before{background:var(--red)}
.tl-item.yellow::before{background:var(--yellow)}
.tl-time{font-size:11px;font-weight:700;color:var(--accent)}
.tl-text{font-size:12px;color:var(--text2)}
.schedule-grid{display:grid;grid-template-columns:60px repeat(7,1fr);gap:2px;font-size:10px;margin:10px 0}
.schedule-grid .sh{font-weight:700;padding:4px;text-align:center;background:var(--bg3);border-radius:var(--radiusSm)}
.schedule-grid .sc{padding:4px;text-align:center;background:var(--bg2);border-radius:var(--radiusSm);border:1px solid var(--border)}
.schedule-grid .sc.on{background:var(--accentBg);border-color:rgba(0,229,160,.3);color:var(--accent);font-weight:600}
.schedule-grid .sc.off{background:var(--redBg);border-color:rgba(226,75,74,.2);color:var(--red)}
.family-card{display:flex;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;transition:.2s}
.family-card:hover{border-color:var(--accent)}
.family-card .av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.family-card .info{flex:1}
.family-card .name{font-weight:700;font-size:14px}
.family-card .meta{font-size:11px;color:var(--text2)}
.action-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.action-card .pri{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.action-card .pri.p1{background:var(--redBg);color:var(--red)}
.action-card .pri.p2{background:var(--yellowBg);color:var(--yellow)}
.action-card .pri.p3{background:var(--blueBg);color:var(--blue)}
.action-card .act-text{flex:1}
.action-card .act-title{font-weight:700;font-size:13px}
.action-card .act-desc{font-size:11px;color:var(--text2)}
.footer{text-align:center;padding:24px;font-size:10px;color:var(--text3)}
@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .histo-label{width:80px;font-size:10px}
  .histo-effect{display:none}
  .stat-row{gap:6px}
  .stat-box{min-width:90px;padding:8px}
  .stat-box .val{font-size:16px}
}
</style>
</head>
<body>
<div class="header">
<h1>💊 <span>NZT-48</span> — Полная карта</h1>
<div class="sub">Денис Оносов | v4.1 | 28.03.2026 | 21 файл · 783К данных · 15 вкладок</div>
</div>

<div class="tabs-wrap">
<div class="tabs" id="tabs"></div>
</div>

<div class="content" id="content"></div>

<div class="footer">⚠️ Конфиденциально | Автор: Denis Onosov (ODV999) | NZT-48 Project</div>

<script>
const TABS=[
{id:'brain',icon:'🧠',label:'Мозг NZT'},
{id:'body',icon:'💪',label:'Тело'},
{id:'age',icon:'🧬',label:'Молодость'},
{id:'potency',icon:'🍆',label:'Потенция'},
{id:'mushrooms',icon:'🍄',label:'Грибы'},
{id:'cyborg',icon:'⚡',label:'Киборг'},
{id:'labs',icon:'🔬',label:'Анализы'},
{id:'family',icon:'👨‍👩‍👦',label:'Семья'},
{id:'breath',icon:'🌬️',label:'Дыхание'},
{id:'cognition',icon:'🧠',label:'Когниция'},
{id:'exercises',icon:'🏋️',label:'Упражнения'},
{id:'safety',icon:'⚠️',label:'Безопасность'},
{id:'schedule',icon:'📅',label:'Расписание'},
{id:'rating',icon:'📊',label:'Рейтинг'},
{id:'plan',icon:'🗺️',label:'План'}
];

function pill(t,c=''){return`<span class="pill ${c}">${t}</span>`}
function badge(t,c){return`<span class="card-badge badge-${c}">${t}</span>`}

function histo(title,items){
  let h=`<div class="histo-section"><div class="histo-title">${title}</div>`;
  items.sort((a,b)=>b.s-a.s);
  items.forEach((it,i)=>{
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const w=Math.max(it.s,5);
    h+=`<div class="histo-bar">
      <div class="histo-medal">${medal}</div>
      <div class="histo-label">${it.n}</div>
      <div class="histo-track"><div class="histo-fill" style="width:${w}%;background:${it.c||'var(--accent)'}">${it.s}</div></div>
      <div class="histo-effect">${it.t||''}</div>
    </div>`;
  });
  return h+'</div>';
}

function card(icon,title,bdg,desc,pills,details){
  return`<div class="card" onclick="this.classList.toggle('open')">
    <div class="card-head"><span class="card-icon">${icon}</span><span class="card-title">${title}</span>${bdg}</div>
    <div class="card-desc">${desc}</div>
    <div class="pills">${pills}</div>
    <div class="details">${details}</div>
  </div>`;
}

const panels={};

// ===== 🧠 МОЗГ =====
panels.brain=()=>{
  let h=`<div class="section-title">🧠 <span>7 нейросистем NZT-стека</span></div>`;
  h+=`<div class="stat-row">
    <div class="stat-box green"><div class="val">98%</div><div class="lbl">Закрытие цели</div></div>
    <div class="stat-box"><div class="val">4</div><div class="lbl">Уровня архитектуры</div></div>
    <div class="stat-box"><div class="val">18</div><div class="lbl">Веществ в стеке</div></div>
    <div class="stat-box"><div class="val">7</div><div class="lbl">Нейросистем</div></div>
  </div>`;
  h+='<div class="grid">';
  h+=card('⚡','ДОФАМИН',badge('ДРАЙВЕР','orange'),'Мотивация, скорость, фокус',
    pill('Фенотропил 100мг×2','accent')+pill('Тирозин 500мг')+pill('Родиола 200мг')+pill('Семакс 400мкг','blue')+pill('Мукуна 200мг'),
    'Фенотропил: 2 нед ON / 1 нед OFF, строго до 14:00. Мукуна: ТОЛЬКО обед 13:00. Родиола: MAO-B↓ → дофамин живёт дольше. Тирозин натощак 06:35.');
  h+=card('🔋','АЦЕТИЛХОЛИН',badge('ТОПЛИВО','blue'),'Бензин для мозга — память, фокус',
    pill('Цитиколин 250мг','accent')+pill('Alpha-GPC 300мг')+pill('Huperzine-A 100мкг','yellow')+pill('Фенотропил'),
    'Холин всего ~165мг (GPC×0.40 + CDP×0.18). Huperzine-A ТОЛЬКО Пн/Ср/Пт (T½ 10–14ч!). Формула: Alpha-GPC мг × 0.40 + CDP-Choline мг × 0.18.');
  h+=card('🌱','BDNF / NGF',badge('СТРОИТЕЛЬСТВО','purple'),'Нейрогенез — новые нейроны и синапсы',
    pill('Семакс 400мкг','accent')+pill('Львиная грива 600мг','accent')+pill('Дигекса 10мг','red')+pill('Кардио'),
    'Тройной нейрогенез: Дигекса (HGF/c-Met → новые синапсы) + Семакс (BDNF ×3–4 → выживание) + Львиная грива (NGF → рост аксонов). Дигекса — экспериментальный, hsCRP каждые 8 нед.');
  h+=card('🩸','КРОВОТОК МОЗГА',badge('СНАБЖЕНИЕ','blue'),'Микроциркуляция → доставка кислорода',
    pill('Гинкго 175мг','accent')+pill('Пикногенол 150мг')+pill('Свёкла 5г')+pill('NMN 500мг'),
    'Гинкго GraFLab комбо 6-в-1 (175мг гинкго + бакопа 100мг + готу кола 75мг + теанин 100мг + CoQ10 50мг + B12 1200мкг). Свёкла → NO пик через 2–3ч = NZT-блок 08:30.');
  h+=card('⛽','ЭНЕРГИЯ НЕЙРОНОВ',badge('ТОПЛИВО','orange'),'Митохондрии мозга + АТФ',
    pill('NMN 500мг','accent')+pill('NR 300мг')+pill('CoQ10 200мг')+pill('PQQ 20мг')+pill('R-ALA 450мг')+pill('Кордицепс 1.5г')+pill('Креатин 5г')+pill('MCT C8 7–10мл','yellow'),
    'NMN сублингвально 06:35. MCT C8 → кетоны (BHB 0.3–0.5) → топливо для NZT-блока. Креатин 5г — АТФ мозга +20%. Кордицепс: GribFarm militaris.');
  h+=card('🔗','СИНАПТИЧЕСКАЯ ПЛАСТИЧНОСТЬ',badge('СИГНАЛ','purple'),'AMPA-модуляция, гибкость синапсов',
    pill('MgLT 2000мг','accent')+pill('Омега-3 DHA')+pill('Ресвератрол 300мг')+pill('Анирацетам 1500мг','yellow')+pill('Маитаке 600мг','blue'),
    'Анирацетам: AMPA↑ + серотонин↑. ТОЛЬКО с жирами! 750мг×2 (завтрак+обед). MgLT — единственный магний через ГЭБ. Маитаке: AMPA-связь не верифицирована (источник: Amazonica, не PubMed).');
  h+=card('🛡️','НЕЙРОПРОТЕКЦИЯ',badge('v3.8','accent'),'Защита от гликации и оксидативного стресса',
    pill('Бенфотиамин 330мг','accent')+pill('Бакопа 100мг')+pill('Готу Кола 75мг'),
    'Бенфотиамин: ↓гликация нервов при HbA1c 5.20% + 100кг. GraFLab комбо (+ALA 400мг, Теанин 100мг, CoQ10 50мг, B12 1200мкг). Бакопа: память +12% за 12 нед.');
  h+='</div>';
  h+=histo('⚡ Рейтинг NZT-компонентов',[
    {n:'Анирацетам',s:95,c:'var(--purple)',t:'AMPA↑, серотонин↑, 1500мг'},
    {n:'Семакс',s:93,c:'var(--blue)',t:'BDNF ×3–4, 400мкг назально'},
    {n:'Фенотропил',s:92,c:'var(--orange)',t:'Дофамин↑, фокус'},
    {n:'NMN',s:90,c:'var(--accent)',t:'NAD⁺↑ 40–60%'},
    {n:'Львиная грива',s:88,c:'var(--accent)',t:'NGF↑, нейрогенез'},
    {n:'Дигекса',s:87,c:'var(--red)',t:'HGF/c-Met, эксперим.'},
    {n:'MgLT',s:85,c:'var(--cyan)',t:'Единственный Mg через ГЭБ'},
    {n:'Гинкго 175мг',s:83,c:'var(--blue)',t:'Микроциркуляция мозга'},
    {n:'Цитиколин',s:80,c:'var(--blue)',t:'Холин → АЦХ'},
    {n:'MCT C8',s:78,c:'var(--yellow)',t:'Кетоны для мозга'},
    {n:'CoQ10',s:76,c:'var(--orange)',t:'Энергия мито + ↓АД'},
    {n:'Бенфотиамин',s:74,c:'var(--accent)',t:'↓Гликация нервов'},
  ]);
  return h;
};

// ===== 💪 ТЕЛО =====
panels.body=()=>{
  let h=`<div class="section-title">💪 <span>Тело — сила, питание, метрики</span></div>`;
  h+=`<div class="stat-row">
    <div class="stat-box"><div class="val">100кг</div><div class="lbl">Вес</div></div>
    <div class="stat-box yellow"><div class="val">28.3</div><div class="lbl">BMI</div></div>
    <div class="stat-box"><div class="val">100×20</div><div class="lbl">Жим лёжа</div></div>
    <div class="stat-box"><div class="val">2650</div><div class="lbl">ккал/день</div></div>
  </div>`;
  h+='<div class="grid">';
  h+=card('🏋️','Тренировки',badge('6 дней','accent'),'Push/Pull/Full + Кардио зона 2',
    pill('Пн: Push+Квадр')+pill('Вт: Кардио+Гибкость')+pill('Ср: Pull+Задняя')+pill('Чт: Кардио+Гибкость')+pill('Пт: Full Body')+pill('Сб: Длинное кардио')+pill('Вс: Мобильность','red'),
    '<b>Предтреник TITAN (27г):</b> Цитруллин 6г + Бета-аланин 3.2г + Бетаин 2.5г + Таурин 2г + Калий 1г + Коллаген 10г + Вит.С 500мг. БЕЗ КОФЕИНА!<br><b>Deload:</b> каждые 4 нед (50% весов). НЕ бег при >95 кг!');
  h+=card('🥩','Питание',badge('−400 ккал','yellow'),'200г белка / 100г жиров / 225г углеводов',
    pill('Белок 200г')+pill('Вода ≥3л')+pill('Рыба 5р/нед','accent')+pill('Яйца 2шт')+pill('Говядина 2р/нед','yellow'),
    '<b>5 продуктов КАЖДЫЙ ДЕНЬ:</b> Яйца 2шт, жирная рыба 200г, свёкла, чёрный чеснок, шоколад ≥85%.<br><b>v7.3:</b> яйца ↓с 3 до 2 (ЛПНП 4.03), говядина макс 2р/нед (ферритин 230), чай к обеду (↓Fe 60%).');

// ===== RENDER =====
function render(){
  const tabsEl=document.getElementById('tabs');
  const contentEl=document.getElementById('content');
  tabsEl.innerHTML=TABS.map(t=>`<button class="tab" data-id="${t.id}">${t.icon} ${t.label}</button>`).join('');
  
  function activate(id){
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));
    contentEl.innerHTML=`<div class="panel active">${panels[id]()}</div>`;
  }
  
  tabsEl.addEventListener('click',e=>{
    const tab=e.target.closest('.tab');
    if(tab)activate(tab.dataset.id);
  });
  
  activate('brain');
}

render();
