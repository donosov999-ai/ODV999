<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NZT-48 · Galaga</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#eaeaea;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
header{padding:8px 16px;display:flex;justify-content:space-between;width:100%;max-width:520px;color:#22d3ee;font-size:14px;font-weight:700}
header a{color:#fbbf24;text-decoration:none;border:1px solid #fbbf24;padding:2px 8px;border-radius:4px}
.wrap{position:relative;margin:auto 0}
canvas{display:block;background:#000;border:2px solid #1e1e3a;border-radius:6px;box-shadow:0 0 30px rgba(34,211,238,.2)}
.hud{position:absolute;top:6px;left:8px;right:8px;display:flex;justify-content:space-between;font-size:12px;color:#22d3ee;font-weight:700;text-shadow:0 0 4px #000;pointer-events:none}
.hud .right{color:#fbbf24}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,5,.85);color:#eaeaea;text-align:center;padding:20px;backdrop-filter:blur(4px)}
.overlay.hide{display:none}
.overlay h2{color:#22d3ee;font-size:36px;margin-bottom:14px;letter-spacing:4px}
.overlay p{margin:4px 0;font-size:13px;line-height:1.5}
.overlay button{margin-top:18px;padding:10px 24px;background:#22d3ee;color:#000;border:none;border-radius:4px;font-weight:700;font-size:14px;cursor:pointer;letter-spacing:2px}
.overlay button:hover{background:#fbbf24}
.controls{margin-top:8px;font-size:11px;color:#6b7280;text-align:center;max-width:480px;line-height:1.5}
</style>
</head>
<body>
<header><span>◀ NZT-48 · Galaga</span><a href="../index.html">Меню</a></header>
<div class="wrap">
  <canvas id="cv" width="480" height="640"></canvas>
  <div class="hud"><span id="hudL">SCORE 0</span><span class="right" id="hudR">WAVE 1 · ♥3</span></div>
  <div class="overlay" id="ov">
    <h2>GALAGA</h2>
    <p>Эскадры заходят сверху по кривым</p>
    <p>Босс-галаг ловит лучом — вернёшь себя = двойной огонь</p>
    <p>Стрелки/A/D — движение · Space — выстрел</p>
    <p>P — пауза · R — рестарт</p>
    <button id="startBtn">START</button>
  </div>
</div>
<div class="controls">Лучшее: <span id="best">0</span> · Эскадры заходят кривыми Безье · Сбитый босс выпускает форменных бабочек</div>
<script>
(()=>{
const cv=document.getElementById('cv'),x=cv.getContext('2d'),W=480,H=640;
const hudL=document.getElementById('hudL'),hudR=document.getElementById('hudR'),ov=document.getElementById('ov');
const startBtn=document.getElementById('startBtn'),bestEl=document.getElementById('best');
const BEST_KEY='nzt_galaga_best';let best=parseInt(localStorage.getItem(BEST_KEY)||'0');bestEl.textContent=best;

let player,bullets,ebullets,enemies,particles,score,wave,lives,paused,gameOver,started,doublefire,frame;
let captureBeam=null;
const keys={};

function reset(){
  player={x:W/2,y:H-50,w:30,h:24,cool:0,captured:false};
  bullets=[];ebullets=[];enemies=[];particles=[];
  score=0;wave=1;lives=3;paused=false;gameOver=false;doublefire=0;frame=0;
  spawnWave();
}
function spawnWave(){
  // formation: 4 rows, 8 columns of butterflies + 1 boss column
  const rows=Math.min(4+Math.floor(wave/3),5),cols=8;
  const startX=60,gapX=44,startY=70,gapY=36;
  let id=0;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const isBoss=r===0&&(c===3||c===4);
      const tx=startX+c*gapX,ty=startY+r*gapY;
      // entry path: Bezier from edge → formation slot
      const fromLeft=c%2===0;
      const sx=fromLeft?-30:W+30,sy=-30+Math.random()*40;
      const cx1=fromLeft?80:W-80,cy1=120+Math.random()*60;
      const cx2=fromLeft?W-100:100,cy2=200+Math.random()*40;
      const delay=id*8;
      enemies.push({
        id:id++,kind:isBoss?'boss':(r<2?'butterfly':'hornet'),
        tx,ty,x:sx,y:sy,t:0,delay,inFormation:false,
        sx,sy,cx1,cy1,cx2,cy2,
        hp:isBoss?2:1,w:24,h:18,
        dive:null,fireCool:200+Math.random()*200
      });
    }
  }
}

function makeBezier(t,x0,y0,x1,y1,x2,y2,x3,y3){
  const u=1-t;
  const x=u*u*u*x0+3*u*u*t*x1+3*u*t*t*x2+t*t*t*x3;
  const y=u*u*u*y0+3*u*u*t*y1+3*u*t*t*y2+t*t*t*y3;
  return [x,y];
}

function update(){
  if(paused||gameOver)return;
  frame++;
  // player
  const sp=4;
  if(keys.ArrowLeft||keys.KeyA)player.x-=sp;
  if(keys.ArrowRight||keys.KeyD)player.x+=sp;
  player.x=Math.max(20,Math.min(W-20,player.x));
  if(player.cool>0)player.cool--;
  if(doublefire>0)doublefire--;
  if((keys.Space||keys.Space)&&player.cool===0&&!player.captured){
    if(doublefire>0){bullets.push({x:player.x-8,y:player.y-12,vy:-8});bullets.push({x:player.x+8,y:player.y-12,vy:-8});}
    else bullets.push({x:player.x,y:player.y-14,vy:-8});
    player.cool=8;
  }
  // bullets
  bullets=bullets.filter(b=>{b.y+=b.vy;return b.y>-20});
  ebullets=ebullets.filter(b=>{b.x+=b.vx||0;b.y+=b.vy;return b.y<H+20&&b.x>-10&&b.x<W+10});
  // enemies
  enemies.forEach(e=>{
    if(e.delay>0){e.delay--;return}
    if(!e.inFormation){
      e.t+=0.012;
      if(e.t>=1){e.inFormation=true;e.x=e.tx;e.y=e.ty}
      else{const p=makeBezier(e.t,e.sx,e.sy,e.cx1,e.cy1,e.cx2,e.cy2,e.tx,e.ty);e.x=p[0];e.y=p[1]}
    }else if(e.dive){
      e.dive.t+=0.015;
      if(e.dive.t>=1){
        // boss capture beam if applicable
        if(e.kind==='boss'&&!captureBeam&&!player.captured&&Math.random()<0.5){
          captureBeam={boss:e,phase:'down',y:e.y,life:120};
          e.dive=null;e.x=e.tx;e.y=e.ty;e.inFormation=true;
        }else{
          // wrap back to formation entry
          e.dive=null;e.t=0;e.inFormation=false;
          e.sx=e.x;e.sy=e.y;
          e.cx1=Math.random()*W;e.cy1=H/2;
          e.cx2=e.tx;e.cy2=e.ty-100;
        }
      }else{
        const d=e.dive;const p=makeBezier(d.t,d.sx,d.sy,d.cx1,d.cy1,d.cx2,d.cy2,d.tx,d.ty);
        e.x=p[0];e.y=p[1];
      }
    }else{
      // formation idle drift
      const w=Math.sin(frame*0.02+e.id*0.3)*8;
      e.x=e.tx+w;
      e.y=e.ty+Math.sin(frame*0.015)*4;
      // sometimes dive
      if(Math.random()<0.0008+wave*0.0001){
        const tgt=player;
        e.dive={t:0,sx:e.x,sy:e.y,
          cx1:e.x+(Math.random()-0.5)*200,cy1:e.y+150,
          cx2:tgt.x+(Math.random()-0.5)*100,cy2:H-100,
          tx:tgt.x+(Math.random()-0.5)*200,ty:H+40};
      }
    }
    // fire
    e.fireCool--;
    if(e.fireCool<=0){
      e.fireCool=200+Math.random()*400-wave*15;
      const dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy);
      ebullets.push({x:e.x,y:e.y+10,vx:dx/d*3,vy:dy/d*3});
    }
  });
  // capture beam
  if(captureBeam){
    captureBeam.life--;
    if(captureBeam.phase==='down'){
      captureBeam.y+=2;
      if(captureBeam.y>=player.y-10){
        // captured!
        if(Math.abs(captureBeam.boss.x-player.x)<40&&!player.captured){
          player.captured=true;
          captureBeam.phase='up';
          captureBeam.captiveY=player.y;
        }else{captureBeam=null}
      }
    }else if(captureBeam.phase==='up'){
      captureBeam.captiveY-=2;
      if(captureBeam.captiveY<=captureBeam.boss.y+20){
        // captive joins boss
        captureBeam.boss.hasCaptive=true;
        captureBeam=null;
        // player loses life but respawns
        lives--;player.captured=false;player.x=W/2;
        if(lives<=0)endGame();
      }
    }
  }
  // collisions: bullet vs enemy
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];if(e.delay>0)continue;
      if(Math.abs(b.x-e.x)<e.w/2&&Math.abs(b.y-e.y)<e.h/2){
        bullets.splice(i,1);
        e.hp--;
        if(e.hp<=0){
          // captive recovered?
          if(e.hasCaptive){
            doublefire=600;burst(e.x,e.y,'#22d3ee',24);score+=400;
          }else burst(e.x,e.y,e.kind==='boss'?'#fbbf24':'#22d3ee',12);
          score+=e.kind==='boss'?150:e.kind==='butterfly'?80:50;
          enemies.splice(j,1);
        }
        break;
      }
    }
  }
  // ebullet vs player
  if(!player.captured){
    for(let i=ebullets.length-1;i>=0;i--){
      const b=ebullets[i];
      if(Math.abs(b.x-player.x)<14&&Math.abs(b.y-player.y)<12){
        ebullets.splice(i,1);
        burst(player.x,player.y,'#ff6b6b',20);
        lives--;player.x=W/2;doublefire=0;
        if(lives<=0)endGame();
        break;
      }
    }
    // enemy vs player (collision)
    enemies.forEach(e=>{
      if(e.delay>0)return;
      if(Math.abs(e.x-player.x)<18&&Math.abs(e.y-player.y)<14){
        burst(player.x,player.y,'#ff6b6b',20);
        lives--;player.x=W/2;
        if(lives<=0)endGame();
      }
    });
  }
  // particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0});
  // wave clear
  if(enemies.length===0){
    wave++;score+=200;spawnWave();
  }
  hudL.textContent='SCORE '+score;
  hudR.textContent='WAVE '+wave+' · ♥'+lives+(doublefire>0?' · 2x':'');
}

function burst(x,y,c,n){
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:30+Math.random()*20,c});
}

function drawShip(p){
  // player ship
  x.save();x.translate(p.x,p.y);
  x.fillStyle='#22d3ee';
  x.beginPath();x.moveTo(0,-12);x.lineTo(-14,12);x.lineTo(0,5);x.lineTo(14,12);x.closePath();x.fill();
  x.fillStyle='#fbbf24';x.fillRect(-3,-6,6,8);
  if(doublefire>0){x.strokeStyle='#22d3ee';x.lineWidth=1;x.beginPath();x.moveTo(-10,-8);x.lineTo(-10,2);x.moveTo(10,-8);x.lineTo(10,2);x.stroke();}
  x.restore();
}
function drawEnemy(e){
  x.save();x.translate(e.x,e.y);
  if(e.kind==='boss'){
    x.fillStyle='#fbbf24';
    x.beginPath();x.ellipse(0,0,14,10,0,0,Math.PI*2);x.fill();
    x.fillStyle='#000';x.fillRect(-3,-2,6,4);
    if(e.hasCaptive){x.fillStyle='#22d3ee';x.fillRect(-4,8,8,4)}
  }else if(e.kind==='butterfly'){
    x.fillStyle='#e879f9';
    x.beginPath();x.moveTo(0,-8);x.lineTo(-12,4);x.lineTo(-6,8);x.lineTo(0,2);x.lineTo(6,8);x.lineTo(12,4);x.closePath();x.fill();
    x.fillStyle='#fbbf24';x.fillRect(-2,-4,4,4);
  }else{
    x.fillStyle='#3b82f6';
    x.beginPath();x.moveTo(0,-6);x.lineTo(-10,8);x.lineTo(0,4);x.lineTo(10,8);x.closePath();x.fill();
    x.fillStyle='#ef4444';x.fillRect(-2,-2,4,4);
  }
  x.restore();
}

function draw(){
  // starfield
  x.fillStyle='#000';x.fillRect(0,0,W,H);
  x.fillStyle='#fff';
  for(let i=0;i<30;i++){
    const sy=((frame*0.5+i*97)%H);
    const sx=(i*53)%W;
    x.fillRect(sx,sy,1,1);
  }
  particles.forEach(p=>{x.fillStyle=p.c;x.globalAlpha=p.life/50;x.fillRect(p.x,p.y,2,2)});
  x.globalAlpha=1;
  enemies.forEach(drawEnemy);
  bullets.forEach(b=>{x.fillStyle='#fbbf24';x.fillRect(b.x-1,b.y-6,2,8)});
  ebullets.forEach(b=>{x.fillStyle='#ff6b6b';x.fillRect(b.x-2,b.y-2,4,4)});
  if(captureBeam){
    const b=captureBeam.boss;
    x.strokeStyle='rgba(251,191,36,.3)';x.lineWidth=24;
    x.beginPath();x.moveTo(b.x,b.y);x.lineTo(b.x,captureBeam.y);x.stroke();
    x.strokeStyle='#fbbf24';x.lineWidth=2;
    x.beginPath();x.moveTo(b.x-12,b.y);x.lineTo(b.x-12,captureBeam.y);x.moveTo(b.x+12,b.y);x.lineTo(b.x+12,captureBeam.y);x.stroke();
    if(captureBeam.phase==='up'){x.fillStyle='#22d3ee';x.fillRect(b.x-8,captureBeam.captiveY,16,12)}
  }
  if(!player.captured)drawShip(player);
  if(paused){x.fillStyle='rgba(0,0,0,.7)';x.fillRect(0,0,W,H);x.fillStyle='#22d3ee';x.font='bold 28px monospace';x.textAlign='center';x.fillText('PAUSED',W/2,H/2)}
}

function loop(){if(started){update();draw();}requestAnimationFrame(loop)}

function endGame(){
  gameOver=true;
  if(score>best){best=score;localStorage.setItem(BEST_KEY,best);bestEl.textContent=best}
  ov.classList.remove('hide');
  ov.querySelector('h2').textContent='GAME OVER';
  ov.querySelector('button').textContent='REPLAY';
  const ps=ov.querySelectorAll('p');ps[0].textContent='Score: '+score+' · Wave: '+wave;ps[1].textContent='Best: '+best;
}

startBtn.onclick=()=>{ov.classList.add('hide');reset();started=true};
addEventListener('keydown',e=>{keys[e.key]=true;keys[e.code]=true;if(e.code==='Space')e.preventDefault();if(e.code==='KeyP')paused=!paused;if(e.code==='KeyR'){ov.classList.add('hide');reset()}});
addEventListener('keyup',e=>{keys[e.key]=false;keys[e.code]=false});
loop();
})();
</script>
</body>
</html>
