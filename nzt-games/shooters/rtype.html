<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>R-Type NZT — NZT-48</title>
<style>
  body { margin:0; min-height:100vh; background:#000; color:#eaeaea;
    font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column;
    justify-content:center; align-items:center; gap:10px; overflow:hidden; padding:6px; }
  .hud { display:flex; gap:18px; font-size:13px; letter-spacing:1px; flex-wrap:wrap; justify-content:center; }
  .hud b { color:#22d3ee; }
  canvas { background:#000015; border:1px solid #1a1a3a;
    box-shadow:0 0 30px rgba(0,200,255,0.3); }
  .wrap { position:relative; }
  .overlay { position:absolute; inset:0; display:none; justify-content:center;
    align-items:center; flex-direction:column; background:rgba(0,0,0,0.8);
    font-size:28px; color:#f43f5e; gap:10px; text-shadow:0 0 20px #f43f5e; }
  .overlay small { font-size:12px; color:#fff; letter-spacing:2px; text-shadow:none; }
  .bar { width:120px; height:6px; background:#222; display:inline-block;
    vertical-align:middle; border:1px solid #444; }
  .bar>div { height:100%;
    background:linear-gradient(90deg,#3b82f6,#22d3ee,#fbbf24,#f43f5e);
    transition:width 0.1s; }
  .controls { font-size:11px; color:#556; letter-spacing:1px; text-align:center; max-width:960px; }
</style>
</head>
<body>
  <div class="hud">
    <div>СЧЁТ <b id="score">0</b></div>
    <div>ЖИЗНИ <b id="lives">3</b></div>
    <div>МОЩЬ <b id="power">1</b>/100</div>
    <div>КЛАСС <b id="tier">I</b>/X</div>
    <div>НАПАРНИКИ <b id="companions">0</b>/10</div>
    <div>ДРОНЫ <b id="drones">0</b>/15</div>
    <div>ЗАРЯД <span class="bar"><div id="chargebar" style="width:0%"></div></span></div>
    <div>СТАДИЯ <b id="stage">1</b></div>
  </div>
  <div class="wrap">
    <canvas id="game" width="960" height="480"></canvas>
    <div id="overlay" class="overlay"></div>
  </div>
  <div class="controls">СТРЕЛКИ/WASD — движение · SPACE — стрельба (зажать — заряд-луч) · F — отбросить/вернуть Force · P — пауза · R — заново · P-бонус — мощь, F — Force, S — жизнь, D — дрон</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const W = canvas.width, H = canvas.height;
const MAX_POWER = 100, MAX_COMPANIONS = 10, MAX_DRONES = 15;
const COMPANION_STEP = 10, TIER_STEP = 10, MAX_TIER = 10;
const TIER_ROMAN = ['','I','II','III','IV','V','VI','VII','VIII','IX','X'];

let player, bullets, enemies, enemyBullets, particles, stars, terrainT, terrainB;
let score, lives, power, gameOver, paused, charge, charging, force, stage, stageTimer, bossActive, boss, keys;
let companions, drones;

function rand(a, b) { return a + Math.random() * (b - a); }
function shipTier() { return Math.min(MAX_TIER, Math.floor((power - 1) / TIER_STEP) + 1); }

function makeStars() {
  stars = [];
  for (let i = 0; i < 140; i++)
    stars.push({x: rand(0, W), y: rand(0, H), z: rand(0.3, 2), s: rand(0.5, 2.2)});
}

function makeTerrain() {
  terrainT = []; terrainB = [];
  for (let x = 0; x < W + 40; x += 20) {
    terrainT.push({x, h: 20 + Math.sin(x * 0.03) * 15 + rand(-5, 10)});
    terrainB.push({x, h: 20 + Math.sin(x * 0.025 + 5) * 15 + rand(-5, 10)});
  }
}

function reset(full = true) {
  if (full) { score = 0; lives = 3; stage = 1; power = 1; }
  player = {x: 80, y: H/2, r: 14, invul: 90, cooldown: 0, missileCooldown: 100};
  bullets = []; enemies = []; enemyBullets = []; particles = [];
  charge = 0; charging = false;
  force = {x: player.x - 30, y: player.y, attached: true, side:'back', r: 14};
  companions = []; drones = [];
  gameOver = false; paused = false; bossActive = false; boss = null;
  stageTimer = 0;
  makeStars(); makeTerrain();
  overlay.style.display = 'none';
}

function spawnEnemy() {
  const r = Math.random();
  const diff = 1 + (stage - 1) * 0.2;
  if (r < 0.45) {
    const e = {type:'sine', x: W+30, y: rand(60, H-60), vx: -2.5*diff, vy: 0,
      r: 14, hp: 1, phase: rand(0, Math.PI*2), amp: rand(30, 80),
      baseY: 0, shootTimer: rand(60, 160), color:'#a855f7'};
    e.baseY = e.y;
    enemies.push(e);
  } else if (r < 0.75) {
    enemies.push({type:'grunt', x: W+30, y: rand(40, H-40), vx: -3.2*diff, vy: 0,
      r: 12, hp: 1, shootTimer: rand(80, 180), color:'#22d3ee'});
  } else if (r < 0.9) {
    enemies.push({type:'tank', x: W+30, y: rand(80, H-80), vx: -1.6*diff, vy: 0,
      r: 20, hp: 5, shootTimer: rand(60, 120), color:'#f43f5e'});
  } else {
    enemies.push({type:'diver', x: W+30, y: 50, vx: -2.5*diff, vy: 1.2,
      r: 13, hp: 2, shootTimer: rand(80, 160), color:'#f59e0b'});
  }
}

function spawnBoss() {
  bossActive = true;
  boss = {x: W + 100, y: H/2, tx: W - 160, vy: 1.5, r: 55,
    hp: 120 + stage * 40, maxHp: 120 + stage * 40,
    shootTimer: 60, pattern: 0, phase: 0};
  enemies.push(boss);
}

function findTarget(x) {
  let best = null, bestDist = Infinity;
  for (const e of enemies) {
    if (e.type === 'power') continue;
    const dx = e.x - x;
    if (dx < 0) continue;
    if (dx < bestDist) { bestDist = dx; best = e; }
  }
  return best;
}

function fireBullet() {
  if (player.cooldown > 0) return;
  const p = power;
  player.cooldown = Math.max(3, 9 - Math.floor(p / 15));
  const dmg = 1 + Math.floor((p - 1) / 5);
  const sp = 14 + Math.min(4, (p - 1) / 15);
  const r = 3 + Math.min(2, (p - 1) / 25);

  bullets.push({x: player.x + 18, y: player.y, vx: sp, vy: 0, r, dmg: dmg+1, kind:'reg'});
  if (p >= 2) {
    bullets.push({x: player.x + 10, y: player.y - 8, vx: sp-1, vy: -1, r, dmg, kind:'reg'});
    bullets.push({x: player.x + 10, y: player.y + 8, vx: sp-1, vy: 1, r, dmg, kind:'reg'});
  }
  if (p >= 4) {
    bullets.push({x: player.x - 18, y: player.y, vx: -10, vy: 0, r, dmg, kind:'back'});
  }
  if (p >= 6) {
    bullets.push({x: player.x + 6, y: player.y - 14, vx: sp-2, vy: -3, r, dmg, kind:'reg'});
    bullets.push({x: player.x + 6, y: player.y + 14, vx: sp-2, vy: 3, r, dmg, kind:'reg'});
  }
  if (p >= 10) {
    bullets.push({x: player.x + 14, y: player.y, vx: sp, vy: 0, r: r+1, dmg: dmg+2, kind:'reg', big:true});
  }
  if (p >= 15) {
    bullets.push({x: player.x - 10, y: player.y - 10, vx: -8, vy: -2, r, dmg, kind:'back'});
    bullets.push({x: player.x - 10, y: player.y + 10, vx: -8, vy: 2, r, dmg, kind:'back'});
  }
  if (p >= 25) {
    bullets.push({x: player.x + 4, y: player.y - 20, vx: sp-3, vy: -4, r, dmg: dmg+1, kind:'reg'});
    bullets.push({x: player.x + 4, y: player.y + 20, vx: sp-3, vy: 4, r, dmg: dmg+1, kind:'reg'});
  }
  if (p >= 35) {
    bullets.push({x: player.x, y: player.y - 16, vx: 0, vy: -8, r, dmg, kind:'side'});
    bullets.push({x: player.x, y: player.y + 16, vx: 0, vy: 8, r, dmg, kind:'side'});
  }
  if (p >= 50) {
    for (let k = -2; k <= 2; k++)
      if (k) bullets.push({x: player.x + 10, y: player.y + k*3, vx: sp-1, vy: k*0.3, r, dmg: dmg+1, kind:'reg'});
  }
  if (p >= 70) {
    bullets.push({x: player.x + 20, y: player.y, vx: sp+1, vy: 0, r: r+2, dmg: dmg+4, kind:'reg', big:true});
  }
  if (p >= 90) {
    for (let k = 0; k < 6; k++) {
      const ang = (k - 2.5) * 0.18;
      bullets.push({x: player.x + 14, y: player.y, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp, r, dmg, kind:'reg'});
    }
  }
  if (force.attached || !force.attached) {
    bullets.push({x: force.x + 12, y: force.y, vx: sp, vy: 0, r, dmg: dmg+1, kind:'force'});
  }
  // missiles при power >= 5
  if (p >= 5 && player.missileCooldown <= 0) {
    player.missileCooldown = Math.max(10, 80 - p);
    const count = 1 + Math.floor((p - 5) / 15);
    for (let i = 0; i < count; i++) {
      const side = i % 2 === 0 ? -1 : 1;
      const off = Math.ceil(i / 2) * 8;
      bullets.push({x: player.x, y: player.y + side*(10+off), vx: 4, vy: side*3, r: 4,
        dmg: 3 + Math.floor(p/8), kind:'missile', homing:true, life: 180, target: findTarget(player.x)});
    }
  } else if (player.missileCooldown > 0) player.missileCooldown--;
}

function fireCharge(c) {
  const lvl = Math.min(3, Math.floor(c / 33));
  if (lvl === 0) { fireBullet(); return; }
  const sx = player.x + 18, sy = player.y;
  const pboost = 1 + Math.floor(power / 20);
  if (lvl === 1)
    bullets.push({x:sx, y:sy, vx:16, vy:0, r:6, dmg:3*pboost, kind:'charge1', life:60});
  else if (lvl === 2)
    bullets.push({x:sx, y:sy, vx:17, vy:0, r:9, dmg:6*pboost, kind:'charge2', life:70});
  else
    for (let i = 0; i < 5; i++)
      bullets.push({x:sx + i*6, y:sy, vx:18, vy:0, r:11, dmg:10*pboost, kind:'charge3', life:80});
}

function addCompanion() {
  if (companions.length >= MAX_COMPANIONS) return false;
  const slot = companions.length;
  const side = slot % 2 === 0 ? -1 : 1;
  const row = Math.floor(slot / 2) + 1;
  companions.push({x: player.x, y: player.y, offX: -row*22, offY: side*(18 + row*6),
    cooldown: 0, hp: 5, maxHp: 5, invul: 60});
  return true;
}

function addDrone() {
  if (drones.length >= MAX_DRONES) return false;
  drones.push({x: player.x, y: player.y, angle: Math.random() * Math.PI * 2,
    cooldown: rand(0, 30), hp: 3});
  return true;
}

function checkCompanionUnlocks(prev, now) {
  const pc = Math.floor(prev / COMPANION_STEP);
  const nc = Math.min(MAX_COMPANIONS, Math.floor(now / COMPANION_STEP));
  for (let k = pc; k < nc; k++) addCompanion();
}

function companionFire(c) {
  const p = power;
  const dmg = 1 + Math.floor(p / 8);
  bullets.push({x: c.x + 12, y: c.y, vx: 13, vy: 0, r: 3, dmg, kind:'force'});
  if (p >= 30)
    bullets.push({x: c.x + 10, y: c.y - 6, vx: 12, vy: -1, r: 3, dmg, kind:'force'});
  if (p >= 60)
    bullets.push({x: c.x + 10, y: c.y + 6, vx: 12, vy: 1, r: 3, dmg, kind:'force'});
  if (p >= 90)
    bullets.push({x: c.x + 14, y: c.y, vx: 14, vy: 0, r: 4, dmg: dmg+2, kind:'force', big:true});
}

function droneFire(d) {
  const dmg = 1 + Math.floor(power / 10);
  bullets.push({x: d.x + 8, y: d.y, vx: 12, vy: 0, r: 2.5, dmg, kind:'force'});
}

function updatePlayer() {
  const spd = 4.5;
  let vx=0, vy=0;
  if (keys['ArrowLeft']||keys['a']||keys['A']) vx -= spd;
  if (keys['ArrowRight']||keys['d']||keys['D']) vx += spd;
  if (keys['ArrowUp']||keys['w']||keys['W']) vy -= spd;
  if (keys['ArrowDown']||keys['s']||keys['S']) vy += spd;
  player.x = Math.max(player.r, Math.min(W/2, player.x + vx));
  player.y = Math.max(player.r + 5, Math.min(H - player.r - 5, player.y + vy));

  if (charging) charge = Math.min(100, charge + 2.2);
  if (player.cooldown > 0) player.cooldown--;
  if (player.invul > 0) player.invul--;

  if (Math.random() < 0.6) {
    particles.push({x: player.x - 14, y: player.y + rand(-3,3),
      vx: -rand(2,4), vy: rand(-0.3,0.3), life: 14, max:14, color:'#fbbf24'});
  }
}

function updateForce() {
  if (force.attached) {
    const off = force.side === 'front' ? 26 : -26;
    force.x += (player.x + off - force.x) * 0.25;
    force.y += (player.y - force.y) * 0.25;
  } else {
    force.x += 2.5;
    if (force.x > W - 60) force.x = W - 60;
  }
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    const dx = b.x - force.x, dy = b.y - force.y;
    if (dx*dx + dy*dy < (b.r + force.r)**2) {
      enemyBullets.splice(i, 1);
      burst(b.x, b.y, '#fde68a', 6, 2);
    }
  }
  for (let j = enemies.length - 1; j >= 0; j--) {
    const e = enemies[j];
    if (e === boss || e.type === 'power') continue;
    const dx = e.x - force.x, dy = e.y - force.y;
    if (dx*dx + dy*dy < (e.r + force.r)**2) {
      e.hp -= 2;
      if (e.hp <= 0) { score += 20; burst(e.x, e.y, e.color, 16, 4); enemies.splice(j,1); }
    }
  }
}

function updateCompanions() {
  for (let i = companions.length - 1; i >= 0; i--) {
    const c = companions[i];
    const tx = player.x + c.offX, ty = player.y + c.offY;
    c.x += (tx - c.x) * 0.18;
    c.y += (ty - c.y) * 0.18;
    c.cooldown--;
    if (c.cooldown <= 0) {
      c.cooldown = Math.max(5, 16 - Math.floor(power / 12));
      companionFire(c);
    }
    if (c.invul > 0) c.invul--;
    if (c.invul === 0) {
      for (let j = enemyBullets.length - 1; j >= 0; j--) {
        const b = enemyBullets[j];
        const dx = b.x - c.x, dy = b.y - c.y;
        if (dx*dx + dy*dy < (b.r + 12)**2) {
          enemyBullets.splice(j, 1);
          c.hp--; c.invul = 20;
          burst(c.x, c.y, '#00e6b8', 8, 2);
          if (c.hp <= 0) { burst(c.x, c.y, '#00e6b8', 25, 5); companions.splice(i, 1); }
          break;
        }
      }
    }
  }
}

function updateDrones() {
  for (let i = 0; i < drones.length; i++) {
    const d = drones[i];
    d.angle += 0.05;
    const off = (i / drones.length) * Math.PI * 2;
    const rad = 38;
    const tx = player.x + Math.cos(d.angle + off) * rad;
    const ty = player.y + Math.sin(d.angle + off) * rad;
    d.x += (tx - d.x) * 0.25;
    d.y += (ty - d.y) * 0.25;
    d.cooldown--;
    if (d.cooldown <= 0) {
      d.cooldown = Math.max(10, 24 - Math.floor(power / 6));
      droneFire(d);
    }
    for (let j = enemyBullets.length - 1; j >= 0; j--) {
      const b = enemyBullets[j];
      const dx = b.x - d.x, dy = b.y - d.y;
      if (dx*dx + dy*dy < (b.r + 10)**2) {
        enemyBullets.splice(j, 1);
        d.hp--;
        burst(d.x, d.y, '#60a5fa', 6, 2);
        if (d.hp <= 0) { burst(d.x, d.y, '#60a5fa', 18, 4); drones.splice(i, 1); i--; }
        break;
      }
    }
  }
}

function toggleForce() {
  if (force.attached) { force.attached = false; }
  else {
    const dx = force.x - player.x, dy = force.y - player.y;
    if (dx*dx + dy*dy < 200*200) {
      force.attached = true;
      force.side = force.side === 'front' ? 'back' : 'front';
    } else {
      force.x += (player.x - force.x) * 0.3;
      force.y += (player.y - force.y) * 0.3;
      if (dx*dx + dy*dy < 50*50) force.attached = true;
    }
  }
}

function burst(x, y, color, n=10, sp=3) {
  for (let i=0; i<n; i++) {
    const a = rand(0, Math.PI*2);
    const s = rand(0.5, sp);
    particles.push({x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: rand(18, 36), max: 36, color});
  }
}

function updateBullets() {
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if (b.homing) {
      if (!b.target || !enemies.includes(b.target) || b.target.type === 'power')
        b.target = findTarget(b.x);
      if (b.target) {
        const dx = b.target.x - b.x, dy = b.target.y - b.y;
        const d = Math.hypot(dx, dy) || 1;
        const tvx = dx/d*8, tvy = dy/d*8;
        b.vx += (tvx - b.vx) * 0.12;
        b.vy += (tvy - b.vy) * 0.12;
      }
      if (Math.random() < 0.7)
        particles.push({x:b.x, y:b.y, vx:rand(-0.5,0.5), vy:rand(-0.5,0.5),
          life:15, max:15, color:'#fb923c'});
    }
    b.x += b.vx; b.y += b.vy;
    if (b.life !== undefined) { b.life--; if (b.life <= 0) { bullets.splice(i,1); continue; } }
    if (b.x > W+20 || b.x < -20 || b.y > H+20 || b.y < -20) { bullets.splice(i,1); continue; }
    if (b.kind && b.kind.startsWith('charge') && Math.random() < 0.7) {
      particles.push({x:b.x, y:b.y+rand(-3,3), vx:rand(-1,1), vy:rand(-0.5,0.5),
        life:15, max:15, color: b.kind==='charge3'?'#f43f5e':b.kind==='charge2'?'#fbbf24':'#60a5fa'});
    }
    let hit = false;
    for (let j = enemies.length-1; j >= 0; j--) {
      const e = enemies[j];
      if (e.type === 'power') continue;
      const dx = b.x - e.x, dy = b.y - e.y;
      if (dx*dx + dy*dy < (b.r + e.r)**2) {
        e.hp -= b.dmg;
        burst(b.x, b.y, '#fde68a', 4, 2);
        if (!b.kind || !b.kind.startsWith('charge') || b.kind === 'charge1') {
          bullets.splice(i, 1); hit = true;
        }
        if (e.hp <= 0) {
          if (e === boss) {
            burst(e.x, e.y, '#f43f5e', 60, 7);
            score += 2000 + stage * 500;
            bossActive = false; boss = null;
            stage++; stageTimer = 0;
            for (let k = 0; k < 6; k++) {
              const items = ['P','F','S','P','D','P'];
              enemies.push({type:'power', x: e.x + rand(-30,30), y: e.y+rand(-30,30),
                vx: -1, vy: 0, r:10, item: items[k]});
            }
          } else {
            score += e.type === 'tank' ? 80 : e.type === 'sine' ? 30 : 20;
            burst(e.x, e.y, e.color, 14, 4);
            if (Math.random() < 0.14) {
              const roll = Math.random();
              const item = roll < 0.4 ? 'P' : roll < 0.65 ? 'F' : roll < 0.85 ? 'D' : 'S';
              enemies.push({type:'power', x: e.x, y: e.y, vx: -1.2, vy: 0, r:10, item});
            }
          }
          enemies.splice(j, 1);
        }
        if (hit) break;
      }
    }
  }
}

function updateEnemies() {
  for (let i = enemies.length-1; i >= 0; i--) {
    const e = enemies[i];
    if (e === boss) {
      if (boss.x > boss.tx) boss.x -= 1.5;
      else {
        boss.y += boss.vy;
        if (boss.y < 80 || boss.y > H - 80) boss.vy *= -1;
      }
      boss.shootTimer--;
      if (boss.shootTimer <= 0) {
        boss.shootTimer = 35;
        boss.pattern = (boss.pattern + 1) % 3;
        if (boss.pattern === 0) {
          for (let a = 0; a < 6; a++) {
            const ang = Math.PI + (a - 2.5) * 0.18;
            enemyBullets.push({x: boss.x - 40, y: boss.y, vx: Math.cos(ang)*5, vy: Math.sin(ang)*5, r: 5, color:'#f43f5e'});
          }
        } else if (boss.pattern === 1) {
          const dx = player.x - boss.x, dy = player.y - boss.y;
          const d = Math.hypot(dx, dy) || 1;
          enemyBullets.push({x: boss.x-40, y: boss.y, vx: dx/d*6, vy: dy/d*6, r: 6, color:'#fbbf24'});
        } else {
          for (let a = 0; a < 10; a++) {
            const ang = (a/10) * Math.PI * 2 + boss.phase;
            enemyBullets.push({x: boss.x, y: boss.y, vx: Math.cos(ang)*3, vy: Math.sin(ang)*3, r: 4, color:'#a855f7'});
          }
          boss.phase += 0.25;
        }
      }
      continue;
    }
    if (e.type === 'power') {
      e.x += e.vx;
      if (e.x < -20) { enemies.splice(i, 1); continue; }
      const dx = e.x - player.x, dy = e.y - player.y;
      if (dx*dx + dy*dy < (player.r + e.r)**2) {
        if (e.item === 'P') {
          const prev = power;
          power = Math.min(MAX_POWER, power + 1);
          checkCompanionUnlocks(prev, power);
        } else if (e.item === 'S') { lives++; }
        else if (e.item === 'F') { force.attached = true; }
        else if (e.item === 'D') { if (!addDrone()) score += 50; }
        const col = e.item === 'P' ? '#22d3ee' : e.item === 'F' ? '#fbbf24' :
                    e.item === 'D' ? '#60a5fa' : '#4ade80';
        burst(e.x, e.y, col, 20, 3);
        score += 50;
        enemies.splice(i, 1);
      }
      continue;
    }
    e.x += e.vx;
    if (e.type === 'sine') {
      e.phase += 0.07;
      e.y = e.baseY + Math.sin(e.phase) * e.amp;
    } else if (e.type === 'diver') {
      e.y += e.vy;
      if (e.y > H - 60) e.vy = -1.2;
      if (e.y < 50) e.vy = 1.2;
    }
    if (e.x < -50) { enemies.splice(i, 1); continue; }
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.x < W - 20) {
      e.shootTimer = rand(60, 200);
      const dx = player.x - e.x, dy = player.y - e.y;
      const d = Math.hypot(dx, dy) || 1;
      enemyBullets.push({x: e.x - 8, y: e.y, vx: dx/d*4.5, vy: dy/d*4.5, r: 4, color: e.color});
      if (e.type === 'tank') {
        enemyBullets.push({x: e.x - 8, y: e.y, vx: dx/d*4.5 + 0.5, vy: dy/d*4.5 - 0.4, r: 4, color: e.color});
        enemyBullets.push({x: e.x - 8, y: e.y, vx: dx/d*4.5 - 0.5, vy: dy/d*4.5 + 0.4, r: 4, color: e.color});
      }
    }
    const dx = e.x - player.x, dy = e.y - player.y;
    if (dx*dx + dy*dy < (e.r + player.r)**2 && player.invul === 0) {
      hitPlayer();
      burst(e.x, e.y, e.color, 20, 4);
      enemies.splice(i, 1);
    }
  }
}

function updateEnemyBullets() {
  for (let i = enemyBullets.length-1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.x < -10 || b.x > W+10 || b.y < -10 || b.y > H+10) { enemyBullets.splice(i,1); continue; }
    const dx = b.x - player.x, dy = b.y - player.y;
    if (dx*dx + dy*dy < (b.r + player.r)**2 && player.invul === 0) {
      hitPlayer();
      burst(b.x, b.y, '#fff', 8, 3);
      enemyBullets.splice(i, 1);
    }
  }
}

function hitPlayer() {
  lives--;
  player.invul = 120;
  burst(player.x, player.y, '#ff3366', 30, 5);
  if (lives <= 0) gameOver = true;
  else {
    player.x = 80; player.y = H/2;
    power = Math.max(1, power - 2);
  }
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateStars() {
  for (const s of stars) {
    s.x -= s.z * 2;
    if (s.x < 0) { s.x = W; s.y = rand(0, H); }
  }
}

function updateTerrain() {
  const sp = 1.5;
  for (const t of terrainT) t.x -= sp;
  for (const t of terrainB) t.x -= sp;
  if (terrainT[0].x < -40) {
    terrainT.shift();
    const lastX = terrainT[terrainT.length-1].x + 20;
    terrainT.push({x: lastX, h: 20 + Math.sin(lastX * 0.03) * 15 + rand(-5,10)});
  }
  if (terrainB[0].x < -40) {
    terrainB.shift();
    const lastX = terrainB[terrainB.length-1].x + 20;
    terrainB.push({x: lastX, h: 20 + Math.sin(lastX * 0.025 + 5) * 15 + rand(-5,10)});
  }
  if (player.invul === 0) {
    for (const t of terrainT) {
      if (Math.abs(t.x - player.x) < 12 && player.y - player.r < t.h) { hitPlayer(); break; }
    }
    for (const t of terrainB) {
      if (Math.abs(t.x - player.x) < 12 && player.y + player.r > H - t.h) { hitPlayer(); break; }
    }
  }
}

function updateSpawns() {
  if (bossActive) return;
  stageTimer++;
  if (stageTimer % Math.max(18, 60 - stage*3) === 0) spawnEnemy();
  if (stageTimer > 60 * 25 && !bossActive) {
    enemies = enemies.filter(e => e.type !== 'power');
    spawnBoss();
  }
}

function drawStars() {
  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${s.z * 0.5})`;
    ctx.fillRect(s.x, s.y, s.s, s.s);
  }
}

function drawTerrain() {
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath(); ctx.moveTo(0, 0);
  for (const t of terrainT) ctx.lineTo(t.x, t.h);
  ctx.lineTo(W, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#312e81';
  ctx.beginPath(); ctx.moveTo(0, 0);
  for (const t of terrainT) ctx.lineTo(t.x, t.h - 4);
  ctx.lineTo(W, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath(); ctx.moveTo(0, H);
  for (const t of terrainB) ctx.lineTo(t.x, H - t.h);
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#312e81';
  ctx.beginPath(); ctx.moveTo(0, H);
  for (const t of terrainB) ctx.lineTo(t.x, H - t.h + 4);
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
}

function drawPlayer() {
  if (player.invul > 0 && Math.floor(player.invul / 4) % 2) return;
  const t = shipTier();
  const scale = 1 + (t - 1) * 0.06;
  const elite = t >= 10;
  ctx.save();
  ctx.translate(player.x, player.y);
  if (elite) { ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 25; }
  else if (t >= 7) { ctx.shadowColor = '#22d3ee'; ctx.shadowBlur = 15; }
  ctx.scale(scale, scale);
  // wings for higher tiers
  if (t >= 5) {
    ctx.fillStyle = elite ? '#f59e0b' : t >= 8 ? '#0369a1' : '#0e7490';
    ctx.beginPath(); ctx.moveTo(-8, -10); ctx.lineTo(-18, -18); ctx.lineTo(-16, -10); ctx.lineTo(-6, -6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-8, 10); ctx.lineTo(-18, 18); ctx.lineTo(-16, 10); ctx.lineTo(-6, 6); ctx.closePath(); ctx.fill();
  }
  // hull
  ctx.fillStyle = elite ? '#ffcc00' : '#22d3ee';
  ctx.beginPath();
  ctx.moveTo(18 + (t>=3?4:0), 0);
  ctx.lineTo(-12, -12);
  ctx.lineTo(-6, 0);
  ctx.lineTo(-12, 12);
  ctx.closePath(); ctx.fill();
  // cockpit
  ctx.fillStyle = elite ? '#7c2d12' : '#0e7490';
  ctx.fillRect(-10, -4, 14, 8);
  ctx.fillStyle = elite ? '#fef08a' : '#bae6fd';
  ctx.beginPath(); ctx.arc(4, 0, t >= 10 ? 4 : 3, 0, Math.PI*2); ctx.fill();
  // antenna tier 4+
  if (t >= 4) {
    ctx.fillStyle = elite ? '#ef4444' : '#00ffcc';
    ctx.fillRect(18, -2, 4, 4);
  }
  // spike tier 6+
  if (t >= 6) {
    ctx.fillStyle = elite ? '#ef4444' : '#22d3ee';
    ctx.beginPath(); ctx.moveTo(18, -10); ctx.lineTo(26, 0); ctx.lineTo(18, 10); ctx.closePath(); ctx.fill();
  }
  // energy ring tier 8+
  if (t >= 8) {
    ctx.strokeStyle = elite ? '#fbbf24' : '#22d3ee';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2); ctx.stroke();
  }
  // exhaust
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath(); ctx.moveTo(-12, -5); ctx.lineTo(-20 + Math.random()*3, 0); ctx.lineTo(-12, 5); ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.shadowBlur = 0;
}

function drawCompanions() {
  for (const c of companions) {
    if (c.invul > 0 && Math.floor(c.invul/3) % 2) continue;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(0.75, 0.75);
    ctx.fillStyle = '#00e6b8';
    ctx.beginPath();
    ctx.moveTo(16, 0); ctx.lineTo(-10, -10); ctx.lineTo(-6, 0); ctx.lineTo(-10, 10);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#134e4a';
    ctx.fillRect(-8, -3, 10, 6);
    ctx.fillStyle = '#a7f3d0';
    ctx.beginPath(); ctx.arc(2, 0, 2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // hp bar
    ctx.fillStyle = '#222';
    ctx.fillRect(c.x - 12, c.y + 12, 24, 2);
    ctx.fillStyle = '#00ffcc';
    ctx.fillRect(c.x - 12, c.y + 12, 24 * (c.hp/c.maxHp), 2);
  }
}

function drawDrones() {
  for (const d of drones) {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.fillStyle = '#1e40af';
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#60a5fa';
    ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, -1, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0ea5e9';
    ctx.fillRect(-10, -2, 4, 4);
    ctx.fillRect(6, -2, 4, 4);
    ctx.restore();
  }
}

function drawForce() {
  ctx.save();
  ctx.translate(force.x, force.y);
  const pulse = Math.sin(Date.now() * 0.01) * 2;
  ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 15;
  ctx.fillStyle = '#f59e0b';
  ctx.beginPath(); ctx.arc(0, 0, 12 + pulse, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fef3c7';
  ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = force.attached ? '#fbbf24' : '#f43f5e';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  if (e.type === 'power') {
    ctx.rotate(Date.now() * 0.004);
    const col = e.item === 'P' ? '#22d3ee' : e.item === 'F' ? '#fbbf24' :
                e.item === 'D' ? '#60a5fa' : '#4ade80';
    ctx.fillStyle = col;
    ctx.shadowColor = col; ctx.shadowBlur = 15;
    ctx.fillRect(-10, -10, 20, 20);
    ctx.shadowBlur = 0;
    ctx.rotate(-Date.now() * 0.004);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(e.item, 0, 0);
  } else if (e === boss) {
    ctx.fillStyle = '#7f1d1d';
    ctx.beginPath(); ctx.ellipse(0, 0, 55, 38, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f43f5e';
    ctx.beginPath(); ctx.ellipse(-10, 0, 40, 26, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fbbf24';
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath(); ctx.arc(-35, i*12, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(-18, 0, 12, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f43f5e';
    ctx.beginPath(); ctx.ellipse(-18, 0, 4, 3, 0, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle = e.color;
    if (e.type === 'grunt') {
      ctx.beginPath();
      ctx.moveTo(-e.r, 0); ctx.lineTo(e.r, -8); ctx.lineTo(e.r-4, 0); ctx.lineTo(e.r, 8);
      ctx.closePath(); ctx.fill();
    } else if (e.type === 'sine') {
      ctx.beginPath(); ctx.arc(0, 0, e.r, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1e1b4b';
      ctx.fillRect(-e.r*0.7, -2, e.r*1.4, 4);
    } else if (e.type === 'tank') {
      ctx.fillRect(-e.r, -e.r/2, e.r*2, e.r);
      ctx.fillStyle = '#991b1b';
      ctx.fillRect(-6, -e.r/2 - 6, 12, 6);
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
    } else if (e.type === 'diver') {
      ctx.beginPath();
      ctx.moveTo(-e.r, -e.r); ctx.lineTo(e.r, 0); ctx.lineTo(-e.r, e.r);
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.restore();
}

function draw() {
  ctx.fillStyle = '#000015';
  ctx.fillRect(0, 0, W, H);
  drawStars();
  drawTerrain();

  for (const p of particles) {
    const a = p.life / p.max;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = a;
    ctx.fillRect(p.x-1.5, p.y-1.5, 3, 3);
  }
  ctx.globalAlpha = 1;

  for (const b of bullets) {
    if (b.kind === 'missile') {
      const ang = Math.atan2(b.vy, b.vx);
      ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(ang);
      ctx.fillStyle = '#fb923c';
      ctx.shadowColor = '#fb923c'; ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(8, 0); ctx.lineTo(-6, -3); ctx.lineTo(-4, 0); ctx.lineTo(-6, 3);
      ctx.closePath(); ctx.fill();
      ctx.restore(); ctx.shadowBlur = 0;
    } else if (b.kind && b.kind.startsWith('charge')) {
      const col = b.kind === 'charge3' ? '#f43f5e' : b.kind === 'charge2' ? '#fbbf24' : '#60a5fa';
      ctx.fillStyle = '#fff';
      ctx.shadowColor = col; ctx.shadowBlur = 25;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    } else if (b.kind === 'back') {
      ctx.fillStyle = '#a855f7'; ctx.shadowColor = '#a855f7'; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    } else if (b.kind === 'force') {
      ctx.fillStyle = '#fde68a'; ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#22d3ee'; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  for (const b of enemyBullets) {
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  for (const e of enemies) drawEnemy(e);
  drawForce();
  drawCompanions();
  drawPlayer();
  drawDrones();

  if (boss) {
    ctx.fillStyle = '#222';
    ctx.fillRect(20, 8, W-40, 6);
    ctx.fillStyle = '#f43f5e';
    ctx.fillRect(20, 8, (W-40) * (boss.hp/boss.maxHp), 6);
  }

  if (charging && charge > 0) {
    const lvl = Math.min(3, Math.floor(charge / 33));
    const col = lvl === 3 ? '#f43f5e' : lvl === 2 ? '#fbbf24' : lvl === 1 ? '#60a5fa' : '#888';
    ctx.fillStyle = col;
    ctx.shadowColor = col; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(player.x + 20, player.y, 3 + charge/15, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('power').textContent = power;
  document.getElementById('tier').textContent = TIER_ROMAN[shipTier()];
  document.getElementById('companions').textContent = companions.length;
  document.getElementById('drones').textContent = drones.length;
  document.getElementById('stage').textContent = stage;
  document.getElementById('chargebar').style.width = Math.min(100, charge) + '%';
}

function loop() {
  if (!gameOver && !paused) {
    updateStars();
    updateTerrain();
    updatePlayer();
    updateForce();
    updateCompanions();
    updateDrones();
    updateBullets();
    updateEnemies();
    updateEnemyBullets();
    updateParticles();
    updateSpawns();
  }
  draw();
  if (gameOver) {
    overlay.innerHTML = 'КОНЕЦ ИГРЫ<small>СЧЁТ ' + score + ' · R — ЗАНОВО</small>';
    overlay.style.display = 'flex';
  } else if (paused) {
    overlay.innerHTML = 'ПАУЗА';
    overlay.style.display = 'flex';
  } else overlay.style.display = 'none';
  requestAnimationFrame(loop);
}

keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'r' || e.key === 'R') { reset(true); return; }
  if (e.key === 'p' || e.key === 'P') { paused = !paused; return; }
  if (e.key === ' ') { charging = true; e.preventDefault(); }
  if (e.key === 'f' || e.key === 'F') toggleForce();
});
document.addEventListener('keyup', e => {
  keys[e.key] = false;
  if (e.key === ' ') {
    if (charge > 10) fireCharge(charge); else fireBullet();
    charging = false; charge = 0;
  }
});

reset(true);
setInterval(() => { if (charging && charge < 15 && !gameOver && !paused) fireBullet(); }, 80);
requestAnimationFrame(loop);
</script>
</body>
</html>
