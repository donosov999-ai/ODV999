<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>2048 — NZT-48</title>
<style>
  body { margin:0; min-height:100vh; background:#faf8ef; color:#776e65;
    font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column;
    justify-content:center; align-items:center; gap:14px; }
  .hud { display:flex; gap:30px; font-size:18px; letter-spacing:1px; }
  .hud .box { background:#bbada0; color:#fff; padding:10px 18px; border-radius:6px; text-align:center; min-width:80px; }
  .hud .box small { display:block; font-size:11px; opacity:0.8; letter-spacing:2px; }
  .hud .box b { font-size:22px; }
  .board { background:#bbada0; padding:10px; border-radius:8px; position:relative; }
  .grid { display:grid; grid-template-columns: repeat(4, 96px); grid-template-rows: repeat(4, 96px); gap:10px; }
  .cell { background:#cdc1b4; border-radius:4px; }
  .tile { position:absolute; width:96px; height:96px; border-radius:4px;
    display:flex; justify-content:center; align-items:center;
    font-weight:bold; font-size:40px; transition:transform 0.12s, background 0.15s; }
  .wrap { position:relative; }
  .overlay { position:absolute; inset:0; display:none; justify-content:center;
    align-items:center; flex-direction:column; background:rgba(238,228,218,0.8);
    font-size:32px; color:#776e65; gap:8px; border-radius:8px; }
  .overlay small { font-size:14px; color:#776e65; }
  .controls { font-size:12px; color:#999; letter-spacing:1px; }

header.nzt-nav { padding: 8px 16px; display: flex; justify-content: space-between;
  align-items: center; width: 100%; max-width: 720px; margin: 0 auto;
  color: #22d3ee; font-size: 14px; font-weight: 700; font-family: 'Courier New', monospace;
  box-sizing: border-box; }
header.nzt-nav a { color: #fbbf24; text-decoration: none; border: 1px solid #fbbf24;
  padding: 4px 10px; border-radius: 4px; font-family: inherit; font-size: 13px;
  font-weight: 700; }
header.nzt-nav a:hover { background: #fbbf24; color: #000; }
</style>
</head>
<body>
<header class="nzt-nav"><span>◀ NZT-48 · 2048</span><a href="../index.html">Меню</a></header>

  <div class="hud">
    <div class="box"><small>СЧЁТ</small><b id="score">0</b></div>
    <div class="box"><small>РЕКОРД</small><b id="best">0</b></div>
  </div>
  <div class="wrap">
    <div class="board" id="board">
      <div class="grid" id="grid"></div>
    </div>
    <div id="overlay" class="overlay"></div>
  </div>
  <div class="controls">СТРЕЛКИ / WASD · R — заново</div>
<script>
const N = 4;
const gridEl = document.getElementById('grid');
const boardEl = document.getElementById('board');
const overlay = document.getElementById('overlay');
let grid, score, gameOver, won;
let best = +localStorage.getItem('nzt_2048_best') || 0;

const COLORS = {
  2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',
  128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e',
  4096:'#3c3a32',8192:'#3c3a32'
};
const FG = {2:'#776e65',4:'#776e65'};

function emptyGrid() { return Array.from({length:N}, () => Array(N).fill(0)); }

function reset() {
  grid = emptyGrid();
  score = 0;
  gameOver = false; won = false;
  addRandom(); addRandom();
  render();
  overlay.style.display = 'none';
}

function addRandom() {
  const empty = [];
  for (let y=0; y<N; y++) for (let x=0; x<N; x++) if (grid[y][x] === 0) empty.push([x,y]);
  if (empty.length === 0) return;
  const [x,y] = empty[Math.floor(Math.random()*empty.length)];
  grid[y][x] = Math.random() < 0.9 ? 2 : 4;
}

function move(dx, dy) {
  let moved = false;
  const range = (dx>0 || dy>0) ? [3,2,1,0] : [0,1,2,3];
  for (let y=0; y<N; y++) {
    for (let x=0; x<N; x++) {
      const cx = dx!==0 ? range[x] : x;
      const cy = dy!==0 ? range[y] : y;
      if (grid[cy][cx] === 0) continue;
      let nx = cx, ny = cy;
      while (true) {
        const tx = nx + dx, ty = ny + dy;
        if (tx < 0 || tx >= N || ty < 0 || ty >= N) break;
        if (grid[ty][tx] === 0) {
          grid[ty][tx] = grid[ny][nx]; grid[ny][nx] = 0;
          nx = tx; ny = ty; moved = true;
        } else if (grid[ty][tx] === grid[ny][nx] && !grid[ty][tx].__merged) {
          grid[ty][tx] *= 2;
          grid[ty][tx] = Number(grid[ty][tx]);
          // пометка — используем отдельную карту
          mergedMap[ty*N+tx] = true;
          score += grid[ty][tx];
          if (grid[ty][tx] === 2048 && !won) { won = true; }
          grid[ny][nx] = 0;
          moved = true;
          break;
        } else break;
      }
    }
  }
  return moved;
}

let mergedMap = {};
function tryMove(dx, dy) {
  if (gameOver) return;
  mergedMap = {};
  if (move(dx, dy)) {
    addRandom();
    if (score > best) { best = score; localStorage.setItem('nzt_2048_best', best); }
    if (isGameOver()) gameOver = true;
  }
  render();
}

function isGameOver() {
  for (let y=0; y<N; y++) for (let x=0; x<N; x++) {
    if (grid[y][x] === 0) return false;
    if (x<N-1 && grid[y][x] === grid[y][x+1]) return false;
    if (y<N-1 && grid[y][x] === grid[y+1][x]) return false;
  }
  return true;
}

function render() {
  gridEl.innerHTML = '';
  for (let i=0; i<N*N; i++) {
    const c = document.createElement('div');
    c.className = 'cell';
    gridEl.appendChild(c);
  }
  // удалить старые плитки
  boardEl.querySelectorAll('.tile').forEach(t => t.remove());
  for (let y=0; y<N; y++) for (let x=0; x<N; x++) {
    if (grid[y][x] === 0) continue;
    const v = grid[y][x];
    const t = document.createElement('div');
    t.className = 'tile';
    t.textContent = v;
    t.style.background = COLORS[v] || '#3c3a32';
    t.style.color = FG[v] || '#fff';
    if (v >= 1024) t.style.fontSize = '32px';
    else if (v >= 128) t.style.fontSize = '36px';
    t.style.left = (10 + x*106) + 'px';
    t.style.top = (10 + y*106) + 'px';
    boardEl.appendChild(t);
  }
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  if (gameOver) {
    overlay.innerHTML = 'ИГРА ОКОНЧЕНА<small>СЧЁТ ' + score + ' · R — заново</small>';
    overlay.style.display = 'flex';
  } else if (won) {
    overlay.innerHTML = '2048!<small>Продолжай играть · R — заново</small>';
    overlay.style.display = 'flex';
    setTimeout(() => overlay.style.display = 'none', 2000);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') { reset(); return; }
  const m = {ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
    w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]};
  if (m[e.key]) { tryMove(m[e.key][0], m[e.key][1]); e.preventDefault(); }
});

reset();
</script>
</body>
</html>
