<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RELATION OS — Интерактивная карта</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Source+Sans+3:wght@300;400;600;700&display=swap');
:root{
  --bg:#FAF8F5;--bg2:#F0EDE8;--bg3:#E5E1DB;
  --text:#1C1917;--text2:#57534E;--text3:#A8A29E;
  --border:#D6D3CD;--accent:#B45309;--accent2:#92400E;
  --info:#2563EB;--ok:#059669;--danger:#DC2626;--warn:#D97706;
  --gold:#F59E0B;--purple:#7C3AED;--teal:#0D9488;
  --card:#FFFFFF;--card-hover:#FEFDFB;
  --radius:14px;--shadow:0 1px 3px rgba(0,0,0,.06);
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Source Sans 3',-apple-system,sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#171412;--bg2:#231F1B;--bg3:#2E2924;
  --text:#F5F3F0;--text2:#A8A29E;--text3:#6B6560;
  --border:#3D3733;--card:#1E1A16;--card-hover:#252220;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.header{padding:32px 24px 0;max-width:1200px;margin:0 auto}
.header h1{font-family:var(--font-display);font-size:clamp(28px,5vw,42px);font-weight:800;letter-spacing:-.02em;color:var(--accent)}
.header p{color:var(--text2);font-size:14px;margin-top:4px}
.tabs{display:flex;gap:4px;padding:16px 24px 0;max-width:1200px;margin:0 auto;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{white-space:nowrap;padding:10px 16px;border-radius:10px 10px 0 0;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);background:var(--bg2);border:1px solid transparent;border-bottom:none;transition:all .2s;user-select:none}
.tab:hover{background:var(--bg3);color:var(--text)}
.tab.active{background:var(--card);color:var(--accent);border-color:var(--border);position:relative}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--card)}
.content{max-width:1200px;margin:0 auto;padding:0 24px 40px;border-top:1px solid var(--border)}
.panel{display:none;animation:fadeIn .3s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.section-title{font-family:var(--font-display);font-size:22px;font-weight:600;margin:28px 0 16px;color:var(--text)}
.section-sub{font-size:14px;color:var(--text2);margin:-10px 0 18px;line-height:1.5}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .25s;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.card-icon{font-size:28px;flex-shrink:0;line-height:1}
.card-title{font-weight:700;font-size:15px;line-height:1.3}
.card-desc{font-size:13px;color:var(--text2);line-height:1.5}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg2);color:var(--text2)}
.tag.green{background:#ECFDF5;color:#065F46}
.tag.red{background:#FEF2F2;color:#991B1B}
.tag.blue{background:#EFF6FF;color:#1E40AF}
.tag.amber{background:#FFFBEB;color:#92400E}
.tag.purple{background:#F5F3FF;color:#5B21B6}
@media(prefers-color-scheme:dark){
.tag.green{background:#052e16;color:#6ee7b7}
.tag.red{background:#350a0a;color:#fca5a5}
.tag.blue{background:#0c1a3a;color:#93c5fd}
.tag.amber{background:#2a1a00;color:#fcd34d}
.tag.purple{background:#1e0a3e;color:#c4b5fd}
}
.badge{position:absolute;top:12px;right:12px;font-size:14px}
.card-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.6}
.card.open .card-detail{display:block;animation:fadeIn .25s ease}
.histo{margin:20px 0 32px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.histo-title{font-weight:700;font-size:15px;margin-bottom:14px;color:var(--text)}
.histo-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.histo-label{width:140px;flex-shrink:0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.histo-bar-wrap{flex:1;height:24px;background:var(--bg2);border-radius:6px;overflow:hidden;position:relative}
.histo-bar{height:100%;border-radius:6px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:700;color:#fff;min-width:30px}
.histo-medal{width:22px;text-align:center;flex-shrink:0;font-size:14px}
.histo-note{flex-shrink:0;font-size:12px;color:var(--text2);max-width:120px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
table.data{width:100%;border-collapse:collapse;font-size:13px;margin:12px 0}
table.data th,table.data td{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
table.data th{font-weight:700;color:var(--text);background:var(--bg2);position:sticky;top:0}
table.data td{color:var(--text2)}
table.data tr:hover td{background:var(--bg2)}
.insight-box{background:linear-gradient(135deg,var(--bg2),var(--bg));border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:var(--radius);padding:16px 20px;margin:16px 0;font-size:14px;line-height:1.6;color:var(--text2)}
.insight-box strong{color:var(--text)}
.action-list{list-style:none;margin:12px 0}
.action-list li{padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:14px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow)}
.action-list li .a-icon{font-size:18px;flex-shrink:0}
.action-list li .a-text{flex:1}
.action-list li .a-text strong{display:block;color:var(--text);margin-bottom:2px}
.action-list li .a-text span{font-size:13px;color:var(--text2)}
.stars{color:var(--gold);letter-spacing:1px}
.footer{text-align:center;padding:20px;font-size:12px;color:var(--text3)}
@media(max-width:640px){
  .header{padding:20px 16px 0}
  .tabs{padding:12px 16px 0}
  .tab{font-size:12px;padding:8px 12px}
  .content{padding:0 16px 32px}
  .grid{grid-template-columns:1fr}
  .histo-label{width:90px;font-size:12px}
  .histo-note{display:none}
}
</style>
</head>

// Build tabs
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');
DATA.tabs.forEach((t,i)=>{
  const d = document.createElement('div');
  d.className = 'tab'+(i===0?' active':'');
  d.textContent = t.icon+' '+t.label;
  d.onclick = ()=>switchTab(t.id,d);
  tabsEl.appendChild(d);
});

function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

// Render panels
function renderCards(items,containerId){
  const g = document.createElement('div');
  g.className = 'grid';
  items.forEach(c=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      ${c.badge?'<div class="badge">'+c.badge+'</div>':''}
      <div class="card-head"><div class="card-icon">${c.icon}</div><div class="card-title">${c.title}</div></div>
      <div class="card-desc">${c.desc}</div>
      ${c.science!==undefined?`<div class="card-tags">
        <span class="tag blue">Наука ${'★'.repeat(c.science)}${'☆'.repeat(5-c.science)}</span>
        <span class="tag green">Практика ${'★'.repeat(c.practice)}${'☆'.repeat(5-c.practice)}</span>
        <span class="tag purple">Глубина ${'★'.repeat(c.depth)}${'☆'.repeat(5-c.depth)}</span>
      </div>`:''}
      ${c.cat?`<div class="card-tags">${c.score?'<span class="tag '+c.cat+'">Балл: '+c.score+'</span>':''}</div>`:''}
      <div class="card-detail">${c.detail||''}</div>
    `;
    card.onclick = ()=>card.classList.toggle('open');
    g.appendChild(card);
  });
  return g;
}

function miniHisto(title,items){
  const h = document.createElement('div');
  h.className = 'histo';
  const sorted = [...items].sort((a,b)=>b.s-a.s);
  h.innerHTML = `<div class="histo-title">${title}</div>`;
  sorted.forEach((it,i)=>{
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    h.innerHTML += `<div class="histo-row">
      <div class="histo-medal">${medal}</div>
      <div class="histo-label">${it.n}</div>
      <div class="histo-bar-wrap"><div class="histo-bar" style="width:${it.s}%;background:${it.c||'var(--accent)'}">${it.s}</div></div>
      <div class="histo-note">${it.t||''}</div>
    </div>`;
  });
  return h;
}

// PANEL: Rating
function buildRating(){
  const p = document.createElement('div');
  p.id='panel-rating';p.className='panel';
  p.innerHTML='<div class="section-title">📊 Сводный рейтинг</div><div class="section-sub">Все элементы из всех разделов — один рейтинг</div>';
  // Combine books + tools + cycles
  const all = [
    ...DATA.books.filter(b=>b.total>15).map(b=>({n:b.title.split('—')[0].trim(),s:b.total,c:b.color,t:'Книга'})),
    ...DATA.tools.map(t=>({n:t.title,s:t.score,c:'#D97706',t:'Инструмент'})),
    ...DATA.cycles.map(c=>({n:c.title,s:c.score,c:'#DC2626',t:'Цикл/паттерн'}))
  ];
  p.appendChild(miniHisto('Общий рейтинг по баллам',all));
  p.innerHTML += `
  <div class="section-title">Ключевые выводы</div>
  <div class="insight-box"><strong>1.</strong> Готтман и Джонсон — два бесспорных лидера с научной базой. Готтман = ЧТО делать. Джонсон = ПОЧЕМУ это работает.</div>
  <div class="insight-box"><strong>2.</strong> Инструменты коммуникации (NVC, STATE, контрастирование, 5:1) дают максимальный ROI при минимуме времени на освоение.</div>

  return p;
}

// Animate bars on tab switch
const observer = new MutationObserver(()=>{
  document.querySelectorAll('.panel.active .histo-bar').forEach(b=>{
    const w = b.style.width;
    b.style.width = '0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>b.style.width = w));
  });
});
observer.observe(contentEl,{subtree:true,attributes:true,attributeFilter:['class']});
// Initial animation
setTimeout(()=>{
  document.querySelectorAll('.histo-bar').forEach(b=>{
    const w = b.style.width; b.style.width='0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>b.style.width=w));
  });
},100);
